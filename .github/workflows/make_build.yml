# For syntax, see https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax
# Manual workflow that builds release-ready GDExtension artifacts. Trigger
# from the Actions tab; download the merged `spice3d` artifact at the end;
# attach to a GitHub Release.

name: Make a GDExtension build for all supported platforms
on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Each platform needs libngspice built for the host. Linux + macOS
        # build host-native via scripts/build-ngspice-for-native.sh; web
        # builds via scripts/build-ngspice-for-emscripten.sh; Windows builds
        # via the same native script invoked from MSYS2/UCRT64 shell.
        include:
          - target: { platform: linux, arch: x86_64, os: ubuntu-22.04 }
            target-type: template_debug
            float-precision: single
          - target: { platform: linux, arch: x86_64, os: ubuntu-22.04 }
            target-type: template_release
            float-precision: single
          - target: { platform: macos, arch: arm64, os: macos-latest }
            target-type: template_debug
            float-precision: single
          - target: { platform: macos, arch: arm64, os: macos-latest }
            target-type: template_release
            float-precision: single
          - target: { platform: windows, arch: x86_64, os: windows-latest }
            target-type: template_debug
            float-precision: single
          - target: { platform: windows, arch: x86_64, os: windows-latest }
            target-type: template_release
            float-precision: single
          - target: { platform: web, arch: wasm32, os: ubuntu-22.04 }
            target-type: template_debug
            float-precision: single
          - target: { platform: web, arch: wasm32, os: ubuntu-22.04 }
            target-type: template_release
            float-precision: single

    runs-on: ${{ matrix.target.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup MSYS2 (windows only)
        if: matrix.target.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            autoconf
            automake
            libtool
            bison
            flex
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-python

      - name: Install ngspice build prerequisites (linux+web)
        if: matrix.target.platform == 'linux' || matrix.target.platform == 'web'
        shell: bash
        run: sudo apt-get update -qq && sudo apt-get install -y -qq autoconf automake libtool bison flex

      - name: Install ngspice build prerequisites (macos)
        if: matrix.target.platform == 'macos'
        shell: bash
        run: |
          brew install autoconf automake libtool bison
          # macOS ships an ancient bison 2.3 that can't parse ngspice's
          # parse-bison.y; Homebrew's bison 3.x is keg-only so we explicitly
          # prepend its bin to PATH for downstream steps in this job.
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"

      - name: Setup godot-cpp
        uses: ./godot-cpp/.github/actions/setup-godot-cpp
        with:
          platform: ${{ matrix.target.platform }}
          em-version: 3.1.62

      - name: Cache ngspice native build
        if: matrix.target.platform != 'web'
        id: cache_ngspice_native_build
        uses: actions/cache@v4
        with:
          path: third_party/ngspice/build-native
          key: ngspice-native-${{ matrix.target.platform }}-${{ matrix.target.arch }}-${{ hashFiles('scripts/build-ngspice-for-native.sh', '.gitmodules') }}-${{ hashFiles('third_party/ngspice/configure.ac') }}

      - name: Build ngspice for native (linux + macos)
        if: (matrix.target.platform == 'linux' || matrix.target.platform == 'macos') && steps.cache_ngspice_native_build.outputs.cache-hit != 'true'
        run: scripts/build-ngspice-for-native.sh

      - name: Build ngspice for native (windows, inside MSYS2)
        if: matrix.target.platform == 'windows' && steps.cache_ngspice_native_build.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: scripts/build-ngspice-for-native.sh

      - name: Cache ngspice emscripten build
        if: matrix.target.platform == 'web'
        id: cache_ngspice_emscripten_build
        uses: actions/cache@v4
        with:
          path: third_party/ngspice/build-emscripten
          key: ngspice-emscripten-${{ hashFiles('scripts/build-ngspice-for-emscripten.sh', '.gitmodules') }}-${{ hashFiles('third_party/ngspice/configure.ac') }}

      - name: Build ngspice for emscripten
        if: matrix.target.platform == 'web' && steps.cache_ngspice_emscripten_build.outputs.cache-hit != 'true'
        run: scripts/build-ngspice-for-emscripten.sh

      - name: Restore .scons_cache
        uses: ./godot-cpp/.github/actions/godot-cache-restore
        with:
          scons-cache: ${{ github.workspace }}/.scons-cache/
          cache-name: ${{ matrix.target.platform }}_${{ matrix.target.arch }}_${{ matrix.float-precision }}_${{ matrix.target-type }}

      - name: Build GDExtension (linux + macos + web)
        if: matrix.target.platform != 'windows'
        shell: bash
        run: |
          set -e
          PARALLEL_JOB_COUNT="$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)"
          EXTRA=""
          if [ "${{ matrix.target.platform }}" = "web" ]; then
            EXTRA="threads=no"
          fi
          scons -j"$PARALLEL_JOB_COUNT" target=${{ matrix.target-type }} platform=${{ matrix.target.platform }} arch=${{ matrix.target.arch }} precision=${{ matrix.float-precision }} $EXTRA

      - name: Build GDExtension (windows, in cmd to keep Windows path separators)
        if: matrix.target.platform == 'windows'
        shell: cmd
        run: |
          scons -j%NUMBER_OF_PROCESSORS% target=${{ matrix.target-type }} platform=${{ matrix.target.platform }} arch=${{ matrix.target.arch }} precision=${{ matrix.float-precision }}

      - name: Save .scons_cache
        uses: ./godot-cpp/.github/actions/godot-cache-save
        with:
          scons-cache: ${{ github.workspace }}/.scons-cache/
          cache-name: ${{ matrix.target.platform }}_${{ matrix.target.arch }}_${{ matrix.float-precision }}_${{ matrix.target-type }}

      - name: Bundle libngspice next to the GDExtension (linux)
        if: matrix.target.platform == 'linux'
        shell: bash
        run: |
          set -e
          cp -d third_party/ngspice/build-native/src/.libs/libngspice.so* project/bin/linux/
          ls -la project/bin/linux/

      - name: Bundle libngspice next to the GDExtension (macos)
        if: matrix.target.platform == 'macos'
        shell: bash
        run: |
          set -e
          cp -P third_party/ngspice/build-native/src/.libs/libngspice*.dylib project/bin/macos/
          ls -la project/bin/macos/

      - name: Bundle libngspice next to the GDExtension (windows)
        if: matrix.target.platform == 'windows'
        shell: bash
        run: |
          set -e
          cp third_party/ngspice/build-native/src/.libs/libngspice*.dll project/bin/windows/
          ls -la project/bin/windows/

      - name: Bundle ngspice WASM module next to the GDExtension (web)
        if: matrix.target.platform == 'web'
        shell: bash
        run: |
          set -e
          cp third_party/ngspice/build-emscripten/ngspice.js project/bin/web/
          cp third_party/ngspice/build-emscripten/ngspice.wasm project/bin/web/
          ls -la project/bin/web/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spice3d-${{ matrix.target.platform }}-${{ matrix.target.arch }}-${{ matrix.float-precision }}-${{ matrix.target-type }}
          path: |
            project/bin/spice3d.gdextension
            project/bin/${{ matrix.target.platform }}/**

  merge:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: spice3d
          pattern: spice3d-*
          delete-merged: true
