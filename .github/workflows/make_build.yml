# For syntax, see https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax
# Manual workflow that builds release-ready, standalone exported binaries
# of the spice3d application for every platform we ship. Trigger from the
# Actions tab; download the merged `spice3d` artifact at the end; attach
# to a GitHub Release.

name: Make a GDExtension build for all supported platforms
on:
  workflow_dispatch:

env:
  GODOT_VERSION: 4.4.1
  GODOT_STATUS: stable

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: { platform: linux, arch: x86_64, os: ubuntu-22.04 }
            godot-platform: "Linux"
            godot-editor-url-fragment: "linux.x86_64"
            export-output-filename: "spice3d.x86_64"
          - target: { platform: macos, arch: universal, os: macos-latest }
            godot-platform: "macOS"
            godot-editor-url-fragment: "macos.universal"
            export-output-filename: "spice3d.zip"
          - target: { platform: windows, arch: x86_64, os: windows-latest }
            godot-platform: "Windows Desktop"
            godot-editor-url-fragment: "win64.exe"
            export-output-filename: "spice3d.exe"
          - target: { platform: web, arch: wasm32, os: ubuntu-22.04 }
            godot-platform: "Web"
            godot-editor-url-fragment: "linux.x86_64"
            export-output-filename: "index.html"

    runs-on: ${{ matrix.target.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup MSYS2 (windows only)
        if: matrix.target.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            git
            autoconf
            automake
            libtool
            bison
            flex
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-python

      - name: Install ngspice build prerequisites (linux + web)
        if: matrix.target.platform == 'linux' || matrix.target.platform == 'web'
        shell: bash
        run: sudo apt-get update -qq && sudo apt-get install -y -qq autoconf automake libtool bison flex

      - name: Install ngspice build prerequisites (macos)
        if: matrix.target.platform == 'macos'
        shell: bash
        run: |
          brew install autoconf automake libtool bison
          echo "$(brew --prefix bison)/bin" >> "$GITHUB_PATH"

      - name: Setup godot-cpp
        uses: ./godot-cpp/.github/actions/setup-godot-cpp
        with:
          platform: ${{ matrix.target.platform }}
          em-version: 3.1.62

      - name: Cache ngspice native build
        if: matrix.target.platform != 'web'
        id: cache_ngspice_native_build
        uses: actions/cache@v4
        with:
          path: third_party/ngspice/build-native
          key: ngspice-native-${{ matrix.target.platform }}-${{ matrix.target.arch }}-${{ hashFiles('scripts/build-ngspice-for-native.sh', '.gitmodules') }}-${{ hashFiles('third_party/ngspice/configure.ac') }}

      - name: Build ngspice for native (linux + macos)
        if: (matrix.target.platform == 'linux' || matrix.target.platform == 'macos') && steps.cache_ngspice_native_build.outputs.cache-hit != 'true'
        run: scripts/build-ngspice-for-native.sh

      - name: Build ngspice for native (windows, inside MSYS2)
        if: matrix.target.platform == 'windows' && steps.cache_ngspice_native_build.outputs.cache-hit != 'true'
        shell: msys2 {0}
        run: scripts/build-ngspice-for-native.sh

      - name: Cache ngspice emscripten build
        if: matrix.target.platform == 'web'
        id: cache_ngspice_emscripten_build
        uses: actions/cache@v4
        with:
          path: third_party/ngspice/build-emscripten
          key: ngspice-emscripten-${{ hashFiles('scripts/build-ngspice-for-emscripten.sh', '.gitmodules') }}-${{ hashFiles('third_party/ngspice/configure.ac') }}

      - name: Build ngspice for emscripten
        if: matrix.target.platform == 'web' && steps.cache_ngspice_emscripten_build.outputs.cache-hit != 'true'
        run: scripts/build-ngspice-for-emscripten.sh

      - name: Restore .scons_cache
        uses: ./godot-cpp/.github/actions/godot-cache-restore
        with:
          scons-cache: ${{ github.workspace }}/.scons-cache/
          cache-name: ${{ matrix.target.platform }}_${{ matrix.target.arch }}_debug_release

      - name: Build GDExtension template_debug + template_release (linux + macos + web)
        if: matrix.target.platform != 'windows'
        shell: bash
        run: |
          set -e
          PARALLEL_JOB_COUNT="$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)"
          EXTRA=""
          if [ "${{ matrix.target.platform }}" = "web" ]; then
            EXTRA="threads=no"
          fi
          # Both targets are needed: Godot's headless --import loads the
          # debug GDExtension to validate the project; --export-release uses
          # the release one.
          scons -j"$PARALLEL_JOB_COUNT" target=template_debug   platform=${{ matrix.target.platform }} arch=${{ matrix.target.arch }} precision=single $EXTRA
          scons -j"$PARALLEL_JOB_COUNT" target=template_release platform=${{ matrix.target.platform }} arch=${{ matrix.target.arch }} precision=single $EXTRA

      - name: Build GDExtension template_debug + template_release (windows, in cmd)
        if: matrix.target.platform == 'windows'
        shell: cmd
        run: |
          scons -j%NUMBER_OF_PROCESSORS% target=template_debug   platform=windows arch=x86_64 precision=single
          scons -j%NUMBER_OF_PROCESSORS% target=template_release platform=windows arch=x86_64 precision=single

      - name: Save .scons_cache
        uses: ./godot-cpp/.github/actions/godot-cache-save
        with:
          scons-cache: ${{ github.workspace }}/.scons-cache/
          cache-name: ${{ matrix.target.platform }}_${{ matrix.target.arch }}_debug_release

      - name: Cache Godot editor binary and export templates
        id: cache_godot_editor_and_templates
        uses: actions/cache@v4
        with:
          path: |
            ~/godot-editor
            ~/godot-export-templates
          key: godot-editor-and-templates-${{ matrix.target.platform }}-${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}

      - name: Install Godot editor + export templates (linux + web)
        if: (matrix.target.platform == 'linux' || matrix.target.platform == 'web') && steps.cache_godot_editor_and_templates.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          ver="${GODOT_VERSION}-${GODOT_STATUS}"
          base="https://github.com/godotengine/godot/releases/download/${ver}"
          mkdir -p "$HOME/godot-editor"
          curl -fsSL "${base}/Godot_v${ver}_linux.x86_64.zip" -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d "$HOME/godot-editor"
          mv "$HOME/godot-editor/Godot_v${ver}_linux.x86_64" "$HOME/godot-editor/godot"
          chmod +x "$HOME/godot-editor/godot"
          curl -fsSL "${base}/Godot_v${ver}_export_templates.tpz" -o /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d "$HOME/godot-export-templates"

      - name: Install Godot editor + export templates (macos)
        if: matrix.target.platform == 'macos' && steps.cache_godot_editor_and_templates.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          ver="${GODOT_VERSION}-${GODOT_STATUS}"
          base="https://github.com/godotengine/godot/releases/download/${ver}"
          mkdir -p "$HOME/godot-editor"
          curl -fsSL "${base}/Godot_v${ver}_macos.universal.zip" -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d "$HOME/godot-editor"
          curl -fsSL "${base}/Godot_v${ver}_export_templates.tpz" -o /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d "$HOME/godot-export-templates"

      - name: Install Godot editor + export templates (windows)
        if: matrix.target.platform == 'windows' && steps.cache_godot_editor_and_templates.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ver = "${env:GODOT_VERSION}-${env:GODOT_STATUS}"
          $base = "https://github.com/godotengine/godot/releases/download/${ver}"
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\godot-editor" | Out-Null
          Invoke-WebRequest "${base}/Godot_v${ver}_win64.exe.zip" -OutFile "$env:TEMP\godot.zip"
          Expand-Archive -Force "$env:TEMP\godot.zip" -DestinationPath "$env:USERPROFILE\godot-editor"
          Invoke-WebRequest "${base}/Godot_v${ver}_export_templates.tpz" -OutFile "$env:TEMP\templates.tpz"
          Rename-Item "$env:TEMP\templates.tpz" "$env:TEMP\templates.zip"
          Expand-Archive -Force "$env:TEMP\templates.zip" -DestinationPath "$env:USERPROFILE\godot-export-templates"

      - name: Stage export templates into the Godot expected location (unix)
        if: matrix.target.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          target_dir="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          if [ "${{ matrix.target.platform }}" = "macos" ]; then
            target_dir="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          fi
          mkdir -p "$target_dir"
          cp -r "$HOME/godot-export-templates/templates/"* "$target_dir/"
          ls "$target_dir" | head -20

      - name: Stage export templates into the Godot expected location (windows)
        if: matrix.target.platform == 'windows'
        shell: pwsh
        run: |
          $target = "$env:APPDATA\Godot\export_templates\${env:GODOT_VERSION}.${env:GODOT_STATUS}"
          New-Item -ItemType Directory -Force -Path $target | Out-Null
          Copy-Item -Recurse -Force "$env:USERPROFILE\godot-export-templates\templates\*" $target
          Get-ChildItem $target | Select-Object -First 10 | Out-Host

      - name: Run Godot project import (linux + web)
        if: matrix.target.platform == 'linux' || matrix.target.platform == 'web'
        shell: bash
        run: |
          set -e
          cd project
          "$HOME/godot-editor/godot" --headless --import 2>&1 | tail -20

      - name: Run Godot project import (macos)
        if: matrix.target.platform == 'macos'
        shell: bash
        run: |
          set -e
          cd project
          "$HOME/godot-editor/Godot.app/Contents/MacOS/Godot" --headless --import 2>&1 | tail -20

      - name: Run Godot project import (windows)
        if: matrix.target.platform == 'windows'
        shell: pwsh
        run: |
          cd project
          $editor = Get-ChildItem "$env:USERPROFILE\godot-editor" -Filter "*.exe" -Recurse | Select-Object -First 1
          & $editor.FullName --headless --import 2>&1 | Select-Object -Last 20

      - name: Export with Godot (linux + web)
        if: matrix.target.platform == 'linux' || matrix.target.platform == 'web'
        shell: bash
        run: |
          set -e
          mkdir -p build-out/${{ matrix.target.platform }}
          cd project
          "$HOME/godot-editor/godot" --headless --export-release "${{ matrix.godot-platform }}" "../build-out/${{ matrix.target.platform }}/${{ matrix.export-output-filename }}" 2>&1 | tail -30

      - name: Export with Godot (macos)
        if: matrix.target.platform == 'macos'
        shell: bash
        run: |
          set -e
          mkdir -p build-out/${{ matrix.target.platform }}
          cd project
          "$HOME/godot-editor/Godot.app/Contents/MacOS/Godot" --headless --export-release "${{ matrix.godot-platform }}" "../build-out/${{ matrix.target.platform }}/${{ matrix.export-output-filename }}" 2>&1 | tail -30

      - name: Export with Godot (windows)
        if: matrix.target.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "build-out\windows" | Out-Null
          cd project
          $editor = Get-ChildItem "$env:USERPROFILE\godot-editor" -Filter "*.exe" -Recurse | Select-Object -First 1
          & $editor.FullName --headless --export-release "${{ matrix.godot-platform }}" "..\build-out\windows\${{ matrix.export-output-filename }}" 2>&1 | Select-Object -Last 30

      - name: Bundle libngspice next to the exported binary (linux)
        if: matrix.target.platform == 'linux'
        shell: bash
        run: |
          set -e
          cp -d third_party/ngspice/build-native/src/.libs/libngspice.so* build-out/linux/
          ls -la build-out/linux/

      - name: Bundle libngspice next to the exported binary (macos)
        if: matrix.target.platform == 'macos'
        shell: bash
        run: |
          set -e
          mkdir -p build-out/macos/extracted
          unzip -o build-out/macos/spice3d.zip -d build-out/macos/extracted
          frameworks_dir="build-out/macos/extracted/spice3d.app/Contents/Frameworks"
          mkdir -p "$frameworks_dir"
          cp -P third_party/ngspice/build-native/src/.libs/libngspice*.dylib "$frameworks_dir/"
          (cd build-out/macos/extracted && zip -r ../spice3d.zip spice3d.app)
          rm -rf build-out/macos/extracted
          ls -la build-out/macos/

      - name: Bundle libngspice next to the exported binary (windows)
        if: matrix.target.platform == 'windows'
        shell: bash
        run: |
          set -e
          cp third_party/ngspice/build-native/src/.libs/libngspice*.dll build-out/windows/
          ls -la build-out/windows/

      - name: Bundle ngspice WASM module next to the exported web build
        if: matrix.target.platform == 'web'
        shell: bash
        run: |
          set -e
          cp third_party/ngspice/build-emscripten/ngspice.js build-out/web/
          cp third_party/ngspice/build-emscripten/ngspice.wasm build-out/web/
          cp project/web/*.js build-out/web/
          ls -la build-out/web/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spice3d-${{ matrix.target.platform }}-${{ matrix.target.arch }}
          path: build-out/${{ matrix.target.platform }}/**

  merge:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: spice3d
          pattern: spice3d-*
          delete-merged: true
